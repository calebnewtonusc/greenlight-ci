version: "3.9"

services:
  greenlight-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: greenlight-ci:latest
    container_name: greenlight-ci-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GREENLIGHT_MODEL_PATH=/models/greenlight-final
      - BASE_MODEL=Qwen/Qwen2.5-7B-Coder-Instruct
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../checkpoints:/models:ro  # Mount trained model checkpoints (run: cp -r checkpoints/ deploy/checkpoints/ if needed)
      - /var/run/docker.sock:/var/run/docker.sock  # For sandbox execution
    depends_on:
      - redis
    command: ["python", "agents/ci_repair_agent.py", "--serve", "--port", "8000"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  greenlight-sandbox:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: greenlight-ci:latest
    container_name: greenlight-ci-sandbox
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["python", "agents/patch_validator.py", "--sandbox-pool", "8", "--port", "8080"]

  redis:
    image: redis:7-alpine
    container_name: greenlight-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  nginx:
    image: nginx:alpine
    container_name: greenlight-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - greenlight-api

volumes:
  redis-data:
